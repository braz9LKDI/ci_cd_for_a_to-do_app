# -----------------------------------------------------------------------------
# CircleCI pipeline for the ToDoApp workshop.
#
# Current jobs:
#   - test            : runs Jest on every push to every branch
#   - build_and_push  : builds the Docker image and pushes to Docker Hub.
#                       Only runs on `main` and on git tags matching v*.*.*
#
# The `deploy` job will be added in Step 7, running on a self-hosted
# runner installed on the Vagrant VM.
#
# Secrets come from the `docker-hub` Context (see docs/CI_SETUP.md).
# NEVER put secrets in this file.
# -----------------------------------------------------------------------------

version: 2.1

# ---------------------------------------------------------------------------
# Reusable settings
# ---------------------------------------------------------------------------
parameters:
  image_repo:
    type: string
    default: "br4z/to-do_app"

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:

  # -------------------------------------------------------------------------
  # test : install deps + run the Jest suite.
  # Runs on CircleCI's cloud Node executor. Fast, no Docker needed.
  # -------------------------------------------------------------------------
  test:
    docker:
      - image: cimg/node:18.20
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-{{ checksum "package-lock.json" }}
            - v1-npm-
      - run:
          name: Install dependencies
          # `npm install` (not `npm ci`) because package-lock.json is out of
          # sync with package.json in this repo (yarn-only `resolutions`
          # field). See Dockerfile for the same workaround.
          command: npm install --no-audit --no-fund
      - save_cache:
          key: v1-npm-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Run Jest
          command: npm test -- --ci --runInBand

  # -------------------------------------------------------------------------
  # build_and_push : build the runtime image and push to Docker Hub.
  # Uses the `machine` executor so we get a real Docker daemon (faster and
  # simpler than setup_remote_docker for multi-stage builds).
  #
  # Two tags are pushed for every successful build on main:
  #   - <short-sha>   : immutable reference tied to the exact commit
  #   - latest        : moving pointer for convenience / local testing
  #
  # When a git tag matching v*.*.* is pushed, that tag is ALSO applied
  # to the image (e.g. v0.1.0 -> br4z/to-do_app:0.1.0).
  # -------------------------------------------------------------------------
  build_and_push:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Compute image tags
          command: |
            # Short SHA (7 chars) is the primary immutable tag.
            SHORT_SHA="${CIRCLE_SHA1:0:7}"
            echo "export SHORT_SHA=${SHORT_SHA}" >> "$BASH_ENV"

            # If the build was triggered by a git tag like v1.2.3,
            # derive 1.2.3 as an extra semver tag.
            if [[ "${CIRCLE_TAG:-}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              SEMVER="${BASH_REMATCH[1]}"
              echo "export SEMVER=${SEMVER}" >> "$BASH_ENV"
            fi

            echo "SHORT_SHA=${SHORT_SHA}"
            echo "SEMVER=${SEMVER:-<none>}"
      - run:
          name: Log in to Docker Hub
          command: |
            echo "$DOCKERHUB_TOKEN" | docker login \
              --username "$DOCKERHUB_USERNAME" \
              --password-stdin
      - run:
          name: Build runtime image (runs tests inside the test stage too)
          command: |
            # Build test stage first so a failing test breaks the pipeline
            # even if someone disables the `test` job above.
            docker build --target test -t ttd-test .

            # Then build the real runtime image with both tags.
            docker build --target runtime \
              -t "<< pipeline.parameters.image_repo >>:${SHORT_SHA}" \
              -t "<< pipeline.parameters.image_repo >>:latest" \
              .

            # Optional semver tag when triggered by a git tag.
            if [ -n "${SEMVER:-}" ]; then
              docker tag \
                "<< pipeline.parameters.image_repo >>:${SHORT_SHA}" \
                "<< pipeline.parameters.image_repo >>:${SEMVER}"
            fi
      - run:
          name: Push to Docker Hub
          command: |
            docker push "<< pipeline.parameters.image_repo >>:${SHORT_SHA}"
            docker push "<< pipeline.parameters.image_repo >>:latest"
            if [ -n "${SEMVER:-}" ]; then
              docker push "<< pipeline.parameters.image_repo >>:${SEMVER}"
            fi

  # -------------------------------------------------------------------------
  # deploy : run the compose stack on the Vagrant VM via self-hosted runner.
  #
  # Executes *on the VM itself* (resource_class points at our runner).
  # `machine: true` tells CircleCI this is a machine-executor job; on a
  # self-hosted runner the "machine" is simply the host the runner lives on.
  #
  # Secrets:
  #   - docker-hub Context    -> login to avoid anonymous pull rate limits
  #   - deploy-secrets Context-> MYSQL_*, written to /opt/deploy/env/*.env
  # -------------------------------------------------------------------------
  deploy:
    machine: true
    # If you change the namespace/class in CircleCI UI, update this string.
    resource_class: braz9lkdi/deploy-vm
    steps:
      - checkout
      - run:
          name: Log in to Docker Hub
          command: |
            echo "$DOCKERHUB_TOKEN" | docker login \
              --username "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Seed /opt/deploy/env/ from CircleCI Context
          # Writes two env files with tight perms (0600, owned by the
          # runner user). These are ignored by git and never copied off
          # the VM. Rewriting each deploy means a rotation is "push a
          # new pipeline", not "SSH into the VM".
          command: |
            install -d -m 0750 /opt/deploy/env /opt/deploy/app

            umask 077
            cat > /opt/deploy/env/mysql.env \<<EOF
            MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE=${MYSQL_DATABASE}
            MYSQL_USER=${MYSQL_USER}
            MYSQL_PASSWORD=${MYSQL_PASSWORD}
            EOF

            cat > /opt/deploy/env/app.env \<<EOF
            MYSQL_HOST=mysql
            MYSQL_DB=${MYSQL_DATABASE}
            MYSQL_USER=${MYSQL_USER}
            MYSQL_PASSWORD=${MYSQL_PASSWORD}
            EOF
      - run:
          name: Pull image and (re)start the stack
          command: |
            # Tag the freshly-built image by short SHA. Same derivation
            # as build_and_push -- we MUST agree on the tag.
            export APP_IMAGE_TAG="${CIRCLE_SHA1:0:7}"
            echo "Deploying tag: ${APP_IMAGE_TAG}"

            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans
      - run:
          name: Wait for health and smoke-test the API
          # Poll the app for up to 60s. On failure, dump logs so CI output
          # is actually useful instead of just "non-zero exit".
          command: |
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000/items >/dev/null 2>&1; then
                echo "app healthy after ${i} attempt(s)"
                curl -s http://127.0.0.1:3000/items
                exit 0
              fi
              sleep 2
            done

            echo "app did NOT become healthy. Diagnostics:"
            docker compose -f docker-compose.deploy.yml ps
            echo '--- app logs ---'
            docker compose -f docker-compose.deploy.yml logs --tail=100 app || true
            echo '--- mysql logs ---'
            docker compose -f docker-compose.deploy.yml logs --tail=50 mysql || true
            exit 1

# ---------------------------------------------------------------------------
# Workflow
# ---------------------------------------------------------------------------
workflows:
  version: 2

  ci:
    jobs:
      # Run tests on every push, including tags.
      - test:
          filters:
            tags:
              only: /.*/

      # Build + push only on main or on v*.*.* tags, and only if tests pass.
      - build_and_push:
          context:
            - docker-hub
          requires:
            - test
          filters:
            branches:
              only:
                - main
            tags:
              only: /^v\d+\.\d+\.\d+$/

      # Deploy only after build_and_push succeeds. Same branch/tag filter.
      # Needs both Contexts: docker-hub (for login), deploy-secrets (for
      # MYSQL_* passwords seeded into /opt/deploy/env/).
      - deploy:
          context:
            - docker-hub
            - deploy-secrets
          requires:
            - build_and_push
          filters:
            branches:
              only:
                - main
            tags:
              only: /^v\d+\.\d+\.\d+$/
